  categories:
    - name: Dense GPU Server Inventory, Health, and Monitoring
      description: Requests for complete Intersight visibility into GPU server inventory, health, alarms, advisories, and monitoring readiness.
      patterns: ["\\binventory\\b", "\\bhealth\\b", "\\balarm", "\\badvisor", "\\bmonitor", "\\bvisibility\\b", "\\btelemetry\\b", "\\bc845a\\b", "\\bc885a\\b", "\\bbronco\\b", "\\bmustang\\b"]
      summary: Provide complete inventory, health, alarm, and monitoring coverage for dense GPU servers.
      stories:
        - text: As an infrastructure operator, I want complete health, inventory, and alarm visibility for dense GPU servers so I can operate AI infrastructure confidently.
          patterns: []
    - name: GPU Metrics, Telemetry, and Troubleshooting
      description: Requests for GPU-specific metrics, observability, and recovery guidance.
      patterns: ["\\bgpu metrics\\b", "\\bmetrics\\b", "\\bpowering off\\b", "\\brecover\\b", "\\btroubleshoot", "\\btemperature\\b", "\\bfan\\b", "\\bpower consumption\\b"]
      summary: Expose GPU-specific metrics and troubleshooting signals.
      stories:
        - text: As an AI platform operator, I want GPU metrics and recovery guidance so I can detect and resolve accelerator issues before workloads are affected.
          patterns: []
    - name: Firmware, BIOS, and Lifecycle Management
      description: Firmware updates, BIOS policy settings, firmware guardrails, and lifecycle operations for GPU platforms.
      patterns: ["\\bfirmware\\b", "\\bfw update", "\\bbios\\b", "\\bdowngrade\\b", "\\blifecycle\\b", "\\bupgrade\\b"]
      summary: Improve firmware, BIOS, and lifecycle workflows for GPU servers.
      stories:
        - text: As a server administrator, I want firmware and BIOS lifecycle management for GPU systems so I can update and protect dense GPU hardware safely.
          patterns: []
    - name: Policy-Based Management, Profiles, and Configuration
      description: Server profiles, policies, configuration settings, and policy-based management for dense GPU systems.
      patterns: ["\\bpolicy", "\\bprofile", "\\bconfiguration\\b", "\\bconfigur", "\\bserver profile\\b"]
      summary: Add policy-driven configuration and profile support for dense GPU servers.
      stories:
        - text: As a server administrator, I want profile and policy-based management for dense GPU servers so configuration can be standardized across AI fleets.
          patterns: []
    - name: OpenShift and AI Platform Integrations
      description: Integrations that expose server and GPU management into OpenShift, AI POD, VMware, or other AI platform operations.
      patterns: ["\\bopenshift\\b", "\\bplugin\\b", "\\bai pod", "\\bvmware\\b", "\\bvcf\\b", "\\bcluster\\b", "\\brdma\\b"]
      summary: Integrate dense GPU server management into AI platform workflows.
      stories:
        - text: As a platform administrator, I want dense GPU server management integrated into AI and OpenShift workflows so app and infrastructure teams can coordinate operations.
          patterns: []
    - name: Power, Thermal, and Hardware Operations
      description: Power control, thermal data, fan behavior, RMA, vKVM, vMedia, and hardware operational controls.
      patterns: ["\\bpower\\b", "\\bthermal\\b", "\\bfan\\b", "\\btemperature\\b", "\\brma\\b", "\\bvKVM\\b", "\\bvMedia\\b", "\\bserial over lan\\b"]
      summary: Provide operational controls and hardware telemetry needed to manage dense GPU servers.
      stories:
        - text: As an operator, I want power, thermal, console, and hardware-operation controls for dense GPU servers so I can manage incidents without leaving my operating console.
          patterns: []
